<!doctype html>
<html>
<head>
<script>
if (window.location.hash) {
  const hash = window.location.hash.substring(1);
  if (hash.includes('recovery_token')) {
    window.location.href = `/admin/#recovery_token=${hash.split('=')[1]}`;
  }
}
</script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin SolarNiger</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
  
  <script>
    // Configuration supplémentaire pour Netlify CMS
    CMS.registerEventListener({
      name: 'preSave',
      handler: ({ entry }) => {
        // Assigner un ID unique si non fourni
        if (!entry.get('id')) {
          return entry.set('id', Date.now());
        }
      }
    });
  </script>
</body>
</html>
